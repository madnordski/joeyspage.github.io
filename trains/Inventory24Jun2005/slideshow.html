var delay=3500;

function autoAdvance() {
  showSlide(i+1);
  timer = window.setTimeout('autoAdvance()', delay);
}

function showSlide(slideNumber) {
  i = slideNumber;
  if (i>=n) i=0;
  if (i<0) i=n-1;
  document.slide.src=file[i];
}

function advance(direction) {
  window.clearTimeout(timer);
  showSlide(i+direction);
}

  <input type=button name="Previous" value="Previous"
         onclick="advance(-1);">
  <input type=button name="Next" value="Next"
         onclick="advance(1);">
  <input type=button name="Last" value="Last"
         onclick="advance(-n);">&nbsp;|&nbsp;
  <input type=button name="Auto" value="Auto Advance"
